    <script>
    /* =========================
       1) حط السعر قبل/بعد هنا
       2) الجاليري: لما تضغط على thumb يتبدّل مكان الصورة الكبيرة ✅
       ========================= */

       // ✅ عدّل السعرين دول فقط:
    const PRICE_AFTER = 949;
const PRICE_BEFORE = 1050;

// ✅ صور المنتج الجديدة
const IMAGES = [
    "https://i.postimg.cc/Dw0VfhH4/7ef0440a1bad497828ca52bd3392ef3b.jpg",
    "https://i.postimg.cc/QdCLNDwb/images.avif",
    "https://i.postimg.cc/qvqfBrSC/photo_٢٠٢٥_١٠_٣١_١٧_٣١_٥٩.jpg",
    "https://i.postimg.cc/W1zRpVCr/photo_٢٠٢٥_١٠_٣١_١٧_٣٢_٠١.jpg",
    "https://i.postimg.cc/jS2VqTmP/photo_٢٠٢٥_١٠_٣١_١٧_٣٣_٤٦.jpg",
    "https://i.postimg.cc/fRy4Wspj/photo_٢٠٢٥_١٠_٣١_١٧_٣٣_٤٨.jpg"
];

// ----- السعر (حساب الخصم والوفير)
const priceNowEl = document.getElementById("priceNow");
const priceOldEl = document.getElementById("priceOld");
const discPctEl = document.getElementById("discPct");
const saveAmtEl = document.getElementById("saveAmt");

function fmt(n) {
    try { return new Intl.NumberFormat("ar-EG").format(n); }
    catch (e) { return String(n); }
}

if (Number(PRICE_AFTER) > 0 && Number(PRICE_BEFORE) > 0 && PRICE_BEFORE > PRICE_AFTER) {
    const save = PRICE_BEFORE - PRICE_AFTER;
    const pct = Math.round((save / PRICE_BEFORE) * 100);

    priceNowEl.textContent = fmt(PRICE_AFTER);
    priceOldEl.textContent = fmt(PRICE_BEFORE);
    discPctEl.textContent = pct;
    saveAmtEl.textContent = fmt(save);
}
else {
    // placeholders واضحة
    priceNowEl.textContent = "PRICE_AFTER";
    priceOldEl.textContent = "PRICE_BEFORE";
    discPctEl.textContent = "—";
    saveAmtEl.textContent = "—";
}

// ----- السواب + اللايتبوكس
let idx = 0;
const mainImg = document.getElementById("mainImg");
const mainShot = document.getElementById("mainShot");
const thumbs = Array.from(document.querySelectorAll("#thumbs .thumb"));

function setActive(i) {
    idx = i;
    mainImg.src = IMAGES[i];
    thumbs.forEach((t, k) = > t.setAttribute("aria-current", k == = i ? "true" : "false"));
}
thumbs.forEach((t, i) = > t.addEventListener("click", () = > setActive(i)));

// Lightbox
const lb = document.getElementById("lb");
const lbImg = document.getElementById("lbImg");
const lbClose = document.getElementById("lbClose");
const lbPrev = document.getElementById("lbPrev");
const lbNext = document.getElementById("lbNext");

function openLB() {
    lbImg.src = IMAGES[idx];
    lb.classList.add("open");
    lb.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
}
function closeLB() {
    lb.classList.remove("open");
    lb.setAttribute("aria-hidden", "true");
    document.body.style.overflow = "";
}
function prev() {
    setActive((idx - 1 + IMAGES.length) % IMAGES.length);
    lbImg.src = IMAGES[idx];
}
function next() {
    setActive((idx + 1) % IMAGES.length);
    lbImg.src = IMAGES[idx];
}

mainShot.addEventListener("click", openLB);
lbClose.addEventListener("click", closeLB);
lbPrev.addEventListener("click", prev);
lbNext.addEventListener("click", next);
lb.addEventListener("click", (e) = > { if (e.target == = lb) closeLB(); });

window.addEventListener("keydown", (e) = > {
    if (!lb.classList.contains("open")) return;
    if (e.key == = "Escape") closeLB();
    if (e.key == = "ArrowLeft") next();
    if (e.key == = "ArrowRight") prev();
});
< / script>
